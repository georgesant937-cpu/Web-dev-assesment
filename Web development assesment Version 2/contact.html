<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us - Special Cakes</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header>

        <div class="top-bar">

            <a href="index.html" class="logo-area">

                <img src="images/logo.jpg"
                    alt="Special Cakes for All Occasions logo"
                    class="site-title">

                <span>Special Cakes for All Occasions</span>

            </a>

            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="cakes.html">Cakes for Sale</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html" class="active">Contact Us</a></li>
                </ul>
            </nav>

        </div>

        <div class="banner-wrapper">
            <img src="images/Banner3.jpg">
                alt="Bakery banner image">
        </div>

    </header>

    <main>

        <section class="section-area">

            <h1>Get in Contact With Us</h1>

            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3318.736436049937!2d151.1058201764243!3d-33.71576827328554!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6b12a796d9d577f9%3A0x2f4b4b8ef0d57770!2s23%20Pacific%20Hwy%2C%20Wahroonga%20NSW%202076!5e0!3m2!1sen!2sau!4v1778551126940!5m2!1sen!2sau"
                width="400"
                height="300"
                allowfullscreen=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>

            <p>23 Pacific Hwy, Sydney NSW</p>
            <p>Phone: 4118 3908</p>
            <p>Email: cakesandpastries@gmail.com</p>

            <form class="contact-form">

                <label for="contact-name">Name</label>
                <input type="text" id="contact-name" name="name" required>

                <label for="contact-email">Email Address</label>
                <input type="email" id="contact-email" name="email" required>

                <label for="contact-phone">Phone Number</label>
                <input type="tel" id="contact-phone" name="phone" required>

                <label for="contact-message">Question or Feedback</label>

                <textarea id="contact-message"
                    name="message"
                    placeholder="Enter your message">
                </textarea>

                <button type="submit">Send</button>

            </form>

        </section>

    </main>

    <footer>
        <p>
            &copy; 2026 Special Cakes for All Occasions.
            Website created by George Sant
        </p>
    </footer>

</body>

</html>
